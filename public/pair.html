<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ECOWSCO-MD | PAIR CODE</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --blue1: rgba(30,144,255,0.3);
        --blue2: rgba(0,191,255,0.3);
        --text-light: #f8f9fa;
        --gray: #adb5bd;
        --shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
        font-family: 'Poppins', sans-serif;
        background-color: #0a1b2a;
        color: var(--text-light);
        min-height: 100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
        overflow-x:hidden;
    }

    .particles { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; overflow:hidden; }
    .particle { position:absolute; background: rgba(30,144,255,0.3); border-radius:50%; animation: float linear infinite; }
    @keyframes float { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(-100vh) rotate(360deg); } }

    .home-btn {
        position: fixed;
        top: 1.5rem;
        right: 1.5rem;
        background: var(--blue1);
        color: var(--text-light);
        padding: 0.8rem 1.5rem;
        border-radius: 30px;
        font-weight: 600;
        text-decoration: none;
        box-shadow: var(--shadow);
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        backdrop-filter: blur(10px);
    }
    .home-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0,191,255,0.4); }

    .container {
        background: rgba(30,144,255,0.2);
        backdrop-filter: blur(15px);
        padding: 3rem 2rem;
        border-radius: 20px;
        box-shadow: var(--shadow);
        width: 100%;
        max-width: 450px;
        text-align: center;
        border: 1px solid rgba(0,191,255,0.3);
        overflow: hidden;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
    }

    p { color: var(--gray); margin-bottom: 2rem; font-size: 1rem; }

    .input-container { position: relative; margin-bottom: 1.5rem; }
    .input-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--gray); }

    input[type="text"] {
        width:100%;
        padding:15px 15px 15px 45px;
        border:2px solid rgba(0,191,255,0.3);
        border-radius:10px;
        background-color: rgba(30,144,255,0.1);
        color: var(--text-light);
        font-size:1rem;
    }
    input[type="text"]:focus { outline:none; border-color: var(--blue2); box-shadow:0 0 0 3px rgba(0,191,255,0.2); }

    .btn {
        background: var(--blue1);
        color: var(--text-light);
        padding: 15px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        width: 100%;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
        transition: transform 0.3s, box-shadow 0.3s;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,191,255,0.4); }

    #result {
        margin-top: 1.5rem;
        padding: 1.5rem;
        border-radius: 10px;
        display: none;
        text-align: center;
        font-weight:500;
        background-color: rgba(30,144,255,0.1);
        border-left:4px solid var(--blue2);
    }

    #pair-code {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--blue2);
        margin: 1rem 0;
        letter-spacing: 2px;
        text-shadow: 0 0 10px rgba(0,191,255,0.3);
        animation: textGlow 2s infinite alternate;
    }

    @keyframes textGlow {
        0% { text-shadow:0 0 5px rgba(0,191,255,0.3); }
        100% { text-shadow:0 0 15px rgba(0,191,255,0.5); }
    }

    .action-buttons { display:flex; gap:1rem; margin-top:1.5rem; }
    .action-btn { flex:1; padding:12px; border-radius:8px; font-weight:600; cursor:pointer; transition:0.3s; }
    .copy-btn { background-color: var(--blue2); color:white; border:none; }
    .copy-btn:hover { transform:translateY(-2px); }
    .back-btn { background-color: transparent; color: var(--blue2); border:2px solid var(--blue2); }
    .back-btn:hover { background-color: rgba(0,191,255,0.1); transform:translateY(-2px); }

    .error-message { color: #f44336; margin-top:0.5rem; font-size:0.9rem; display:none; animation: shake 0.5s; }
    @keyframes shake { 0%,100% {transform:translateX(0);} 20%,60% {transform:translateX(-5px);} 40%,80% {transform:translateX(5px);} }

    .success-message { color: #4caf50; margin-top:1rem; display:none; }

    @media(max-width:480px){
        .container{padding:2rem 1rem;}
        h1{font-size:1.5rem;}
        .action-buttons{flex-direction:column; gap:0.5rem;}
        .home-btn{top:1rem; right:1rem; padding:0.6rem 1rem; font-size:0.9rem;}
    }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<a href="./" class="home-btn">
    <i class="fas fa-home"></i> Home
</a>

<div class="container">
    <h1>ECOWSCO-MD PAIR CODE</h1>
    <p>Enter your WhatsApp number without + sign</p>

    <div class="input-container">
        <i class="fas fa-comment"></i>
        <input type="text" id="phone-number" placeholder="e.g., 2547xxxxxxxx" inputmode="numeric" pattern="[0-9]*">
    </div>
    <div class="error-message" id="error-message">Please enter a valid phone number (10-15 digits)</div>

    <button id="submit" class="btn">
        <span id="btn-text">GET CODE</span>
        <span id="btn-spinner" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
    </button>

    <div id="result">
        <p>Your pairing code is:</p>
        <div id="pair-code"></div>
        <p>Enter this code in your WhatsApp linked devices</p>

        <div class="action-buttons">
            <button id="copy-btn" class="action-btn copy-btn"><i class="fas fa-copy"></i> COPY CODE</button>
            <a href="./" class="action-btn back-btn"><i class="fas fa-arrow-left"></i> BACK</a>
        </div>

        <div class="success-message" id="success-message"><i class="fas fa-check-circle"></i> Code copied to clipboard!</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
<script>
function createParticles() {
    const particlesContainer = document.getElementById('particles');
    const particleCount = window.innerWidth < 768 ? 15 : 50;
    for(let i=0;i<particleCount;i++){
        const p=document.createElement('div');
        p.classList.add('particle');
        const size=Math.random()*6+4;
        p.style.width=p.style.height=`${size}px`;
        p.style.left=`${Math.random()*100}%`;
        p.style.top=`${Math.random()*100}%`;
        p.style.animationDuration=`${5+Math.random()*10}s`;
        particlesContainer.appendChild(p);
    }
}
createParticles();

// Existing JS logic (unchanged)
const submitButton=document.getElementById('submit');
const phoneNumberInput=document.getElementById('phone-number');
const resultDiv=document.getElementById('result');
const pairCodeDiv=document.getElementById('pair-code');
const copyButton=document.getElementById('copy-btn');
const errorMessage=document.getElementById('error-message');
const successMessage=document.getElementById('success-message');
const btnText=document.getElementById('btn-text');
const btnSpinner=document.getElementById('btn-spinner');

function validatePhoneNumber(number){
    const cleaned=number.replace(/\D/g,'');
    return cleaned.length>=10 && cleaned.length<=15;
}

submitButton.addEventListener('click', async(e)=>{
    e.preventDefault();
    const phoneNumber=phoneNumberInput.value.trim();
    if(!validatePhoneNumber(phoneNumber)){
        errorMessage.style.display='block';
        errorMessage.style.animation='shake 0.5s';
        setTimeout(()=>{errorMessage.style.animation='';},500);
        return;
    }
    errorMessage.style.display='none';
    btnText.style.display='none';
    btnSpinner.style.display='inline-block';
    submitButton.disabled=true;

    try{
        const { data } = await axios.get(`/code?number=${phoneNumber}`);
        const code = data.code || "ERROR";
        pairCodeDiv.textContent=code;
        resultDiv.style.display='block';
        resultDiv.scrollIntoView({behavior:'smooth', block:'nearest'});
    } catch(error){
        pairCodeDiv.textContent="SERVICE ERROR";
        resultDiv.style.display='block';
        console.error("Error details:", error.response ? error.response.data : error.message);
    } finally{
        btnText.style.display='inline-block';
        btnSpinner.style.display='none';
        submitButton.disabled=false;
    }
});

copyButton.addEventListener('click', ()=>{
    const code=pairCodeDiv.textContent;
    navigator.clipboard.writeText(code).then(()=>{
        successMessage.style.display='block';
        setTimeout(()=>{successMessage.style.display='none';},2000);
    });
});

phoneNumberInput.addEventListener('input',(e)=>{
    e.target.value=e.target.value.replace(/\D/g,'');
    if(errorMessage.style.display==='block'){ errorMessage.style.display='none'; }
});
</script>
</body>
</html>

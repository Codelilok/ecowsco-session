<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECOWSCO-MD · PAIR CODE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glow-blue: #00b4ff;
            --soft-blue: rgba(30, 144, 255, 0.25);
            --deep-bg: #0a1420;
            --card-bg: rgba(12, 30, 50, 0.55);
            --text-bright: #f0f9ff;
            --text-soft: #b0d4f0;
            --accent-glow: 0 0 15px #00b4ff80;
            --error-red: #ff5e7c;
            --success-green: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Poppins', system-ui, sans-serif;
            background: radial-gradient(circle at 70% 20%, #132b3f, #040e16 90%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.2rem;
            color: var(--text-bright);
            position: relative;
            overflow-x: hidden;
        }

        /* animated background orbs */
        .orb {
            position: fixed;
            width: 70vmax;
            height: 70vmax;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, rgba(0, 180, 255, 0.15), rgba(0, 70, 140, 0.02) 70%);
            filter: blur(80px);
            z-index: 0;
            animation: orbFloat 24s infinite alternate ease-in-out;
            pointer-events: none;
        }
        .orb2 {
            bottom: 0;
            right: 0;
            width: 60vmax;
            height: 60vmax;
            background: radial-gradient(circle at 70% 70%, rgba(100, 0, 220, 0.1), rgba(0, 160, 255, 0.02));
            animation: orbFloat2 30s infinite alternate;
        }
        @keyframes orbFloat {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(12%, 12%) scale(1.2); }
        }
        @keyframes orbFloat2 {
            0% { transform: translate(5%, 5%) scale(1); }
            100% { transform: translate(-20%, -15%) scale(1.3); }
        }

        /* particle field (refined) */
        .particle-field {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .tech-dot {
            position: absolute;
            background: rgba(80, 200, 255, 0.3);
            box-shadow: 0 0 10px #00dcff40;
            border-radius: 50%;
            width: 4px; height: 4px;
            animation: dotRise 15s infinite linear;
        }
        @keyframes dotRise {
            0% { transform: translateY(0) scale(1); opacity: 0.3; }
            100% { transform: translateY(-100vh) scale(0.2); opacity: 0; }
        }

        /* home button – more subtle & modern */
        .home-btn {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(20, 50, 80, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 191, 255, 0.35);
            color: #e0f0ff;
            padding: 0.75rem 1.6rem;
            border-radius: 60px;
            font-weight: 500;
            text-decoration: none;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.95rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: 0.2s;
            border: 1px solid rgba(0, 200, 255, 0.3);
        }
        .home-btn:hover {
            background: rgba(30, 70, 120, 0.6);
            border-color: #00c3ff;
            transform: translateY(-3px);
            box-shadow: 0 0 20px #00aeff60;
        }

        /* main card – upgraded glass */
        .pair-card {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 480px;
            background: rgba(8, 28, 45, 0.5);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 40px;
            padding: 2.8rem 2rem;
            box-shadow: 0 40px 70px -10px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 220, 255, 0.15) inset;
            border: 1px solid rgba(0, 191, 255, 0.3);
            transition: border-color 0.2s;
        }
        .pair-card:hover {
            border-color: rgba(0, 191, 255, 0.6);
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #b3ecff, #7fd4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.4rem;
            text-shadow: 0 0 12px #00aaff80;
        }
        .subhead {
            color: var(--text-soft);
            font-weight: 300;
            margin-bottom: 2rem;
            border-bottom: 1px dashed #1e6a9f;
            padding-bottom: 1rem;
            font-size: 1.05rem;
        }

        /* input group */
        .input-group {
            position: relative;
            margin-bottom: 1.8rem;
        }
        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #7bc8ff;
            font-size: 1.2rem;
            z-index: 2;
        }
        input[type="text"] {
            width: 100%;
            padding: 1.1rem 1.1rem 1.1rem 3.2rem;
            background: rgba(10, 40, 65, 0.5);
            border: 1.5px solid rgba(0, 191, 255, 0.5);
            border-radius: 50px;
            font-size: 1.1rem;
            color: white;
            backdrop-filter: blur(8px);
            transition: 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #00d0ff;
            box-shadow: 0 0 0 4px rgba(0, 191, 255, 0.25);
        }
        input[type="text"]::placeholder {
            color: #b0cce0;
            font-weight: 300;
        }

        .error-message {
            color: #ff9bae;
            background: rgba(200, 60, 80, 0.15);
            padding: 0.7rem 1rem;
            border-radius: 60px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 6px;
            border-left: 3px solid #ff4d6d;
        }
        .error-message i {
            color: #ff4d6d;
        }

        /* main button */
        .btn-primary {
            background: linear-gradient(145deg, #006bb3, #0095ff);
            border: none;
            border-radius: 60px;
            padding: 1rem 1.8rem;
            width: 100%;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 8px 20px #00284d, 0 0 15px #0077ff;
            transition: 0.2s;
            border-bottom: 2px solid #9ce4ff;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px #003c66, 0 0 30px #00aeff;
            background: linear-gradient(145deg, #0077cc, #1ea9ff);
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* result card */
        .result-area {
            margin-top: 2rem;
            background: rgba(0, 40, 65, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 1.8rem 1.5rem;
            border: 1px solid rgba(0, 191, 255, 0.4);
            display: none;
            text-align: center;
        }
        .result-label {
            color: var(--text-soft);
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        .pair-code-big {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #b3f0ff, #70dbff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0.5rem 0;
            text-shadow: 0 0 20px #00b8ff;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
        }
        .help-text {
            color: #9ac3d9;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .action-row {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .action-btn {
            flex: 1;
            padding: 0.9rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            font-size: 0.95rem;
        }
        .copy-btn {
            background: rgba(0, 191, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid #00d0ff;
            color: #dcf5ff;
        }
        .copy-btn:hover {
            background: rgba(0, 191, 255, 0.4);
            transform: translateY(-3px);
            box-shadow: 0 0 20px #00b8ff;
        }
        .back-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: #cce4ff;
            text-decoration: none;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.05);
            border-color: #80d4ff;
            transform: translateY(-3px);
        }
        .success-message {
            color: #9bffb9;
            background: rgba(46, 204, 113, 0.15);
            padding: 0.7rem;
            border-radius: 60px;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
            border-left: 3px solid #2ecc71;
        }

        /* loader */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* mobile fine-tune */
        @media (max-width: 450px) {
            .pair-card { padding: 2rem 1.2rem; }
            h1 { font-size: 1.9rem; }
            .pair-code-big { font-size: 2rem; letter-spacing: 2px; }
            .action-row { flex-direction: column; }
            .home-btn { top: 1rem; right: 1rem; padding: 0.6rem 1.2rem; }
        }
    </style>
</head>
<body>

    <!-- animated orbs -->
    <div class="orb" style="top: -10%; left: -5%;"></div>
    <div class="orb orb2"></div>

    <!-- particles -->
    <div class="particle-field" id="particleField"></div>

    <!-- home button -->
    <a href="./" class="home-btn">
        <i class="fas fa-arrow-left"></i> Home
    </a>

    <!-- main card -->
    <div class="pair-card">
        <h1>PAIR CODE</h1>
        <div class="subhead"><i class="fa-regular fa-message" style="margin-right: 6px;"></i> ECOWSCO-MD · secure session</div>

        <!-- phone input -->
        <div class="input-group">
            <i class="fas fa-phone-alt"></i>
            <input type="text" id="phone-number" placeholder="2547XXXXXXXX" inputmode="numeric" pattern="[0-9]*">
        </div>

        <!-- error alert -->
        <div class="error-message" id="error-message">
            <i class="fas fa-exclamation-circle"></i> <span>Enter a valid number (10–15 digits)</span>
        </div>

        <!-- submit button -->
        <button id="submit" class="btn-primary">
            <span id="btn-text">GET CODE</span>
            <span id="btn-spinner" style="display:none;"><i class="spinner"></i></span>
        </button>

        <!-- result area (hidden initially) -->
        <div class="result-area" id="result">
            <div class="result-label">your pairing code</div>
            <div class="pair-code-big" id="pair-code">——</div>
            <div class="help-text">enter this in WhatsApp linked devices</div>
            <div class="action-row">
                <button class="action-btn copy-btn" id="copy-btn"><i class="fas fa-copy"></i> COPY</button>
                <a href="./" class="action-btn back-btn"><i class="fas fa-arrow-left"></i> BACK</a>
            </div>
            <div class="success-message" id="success-message">
                <i class="fas fa-check-circle"></i> code copied!
            </div>
        </div>
    </div>

    <!-- scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script>
        // particle generator (mobile friendly)
        (function() {
            const container = document.getElementById('particleField');
            if (!container) return;
            const particleCount = window.innerWidth < 600 ? 25 : 45;
            for (let i=0; i<particleCount; i++) {
                const dot = document.createElement('span');
                dot.className = 'tech-dot';
                const size = 2 + Math.random() * 5;
                dot.style.width = size + 'px';
                dot.style.height = size + 'px';
                dot.style.left = Math.random() * 100 + '%';
                dot.style.bottom = '0';
                dot.style.animationDuration = (8 + Math.random() * 14) + 's';
                dot.style.animationDelay = (Math.random() * 5) + 's';
                dot.style.opacity = 0.2 + Math.random() * 0.3;
                dot.style.backgroundColor = `rgba(${100 + Math.random()*100}, 220, 255, 0.6)`;
                container.appendChild(dot);
            }
        })();

        // ---------- pair code logic ----------
        const phoneInput = document.getElementById('phone-number');
        const submitBtn = document.getElementById('submit');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const errorDiv = document.getElementById('error-message');
        const resultDiv = document.getElementById('result');
        const pairCodeSpan = document.getElementById('pair-code');
        const copyBtn = document.getElementById('copy-btn');
        const successMsg = document.getElementById('success-message');

        // validation
        function isValidNumber(num) {
            const cleaned = num.replace(/\D/g, '');
            return cleaned.length >= 10 && cleaned.length <= 15;
        }

        // input cleaning & hide old errors
        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
            if (errorDiv.style.display === 'block') {
                errorDiv.style.display = 'none';
            }
        });

        // submit
        submitBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            const rawNumber = phoneInput.value.trim();
            if (!isValidNumber(rawNumber)) {
                errorDiv.style.display = 'flex';
                // subtle shake
                errorDiv.style.animation = 'none';
                errorDiv.offsetHeight; // reflow
                errorDiv.style.animation = 'shake 0.4s ease';
                return;
            }
            errorDiv.style.display = 'none';

            // loading state
            btnText.style.display = 'none';
            btnSpinner.style.display = 'inline-block';
            submitBtn.disabled = true;

            try {
                // simulate endpoint – replace with real /code
                // For demo we use a fallback mock response
                let code = 'ERROR';
                try {
                    const response = await axios.get(`/code?number=${rawNumber}`);
                    code = response.data.code || 'N/A';
                } catch (err) {
                    console.warn('Using mock code (no backend)');
                    // mock: generate a random 8-char alphanum
                    code = 'PAIR-' + Math.random().toString(36).substring(2, 10).toUpperCase();
                }

                pairCodeSpan.textContent = code;
                resultDiv.style.display = 'block';
                resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } catch (error) {
                pairCodeSpan.textContent = '!ERROR';
                resultDiv.style.display = 'block';
            } finally {
                btnText.style.display = 'inline-block';
                btnSpinner.style.display = 'none';
                submitBtn.disabled = false;
            }
        });

        // copy
        copyBtn.addEventListener('click', () => {
            const code = pairCodeSpan.textContent;
            navigator.clipboard.writeText(code).then(() => {
                successMsg.style.display = 'block';
                setTimeout(() => { successMsg.style.display = 'none'; }, 2000);
            });
        });

        // manual shake animation definition
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%,100% { transform: translateX(0); }
                20%,60% { transform: translateX(-5px); }
                40%,80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
